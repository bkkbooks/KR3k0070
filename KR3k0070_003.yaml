body:
  text: 跋跋舊鈔本翰苑殘帙失卷次卷尾有後敘以新唐書及日本見在書目所錄卷數推之當為卷第卅筑前男爵西高辻君信稚所藏或審定以為菅為長卿書顧其書法古勁紙黑芬郁不下貞觀元慶豈菅氏襲藏古本傳于西高辻氏者僅得以保殘守缺歟麻牋卷子首題翰苑卷第張楚金撰雍公叡注次有目次正文大書體駢用儷夾注雙行稱引繁富楚金後敘言以唐顯慶五年三月十二日癸丑晝寢并州太原縣之廉平里夢與兄越石同謁孔子寤而興歎遂著是書言雖涉誕其著書之時可據以考焉按新唐書藝文志類書類有張楚金翰苑七卷總集類重出張楚金翰苑三十卷日本現在書目雜家有翰苑三十卷張楚金撰乃知唐志類書類所出卷數誤也崇文總目據錢侗輯釋本類書類有張楚金撰翰苑七卷卷數同唐志類書類宋史藝文志類書類亦有雍公叡注張楚金翰苑十一卷七字與十一形近宋志或承唐志之誤而字更訛也南渡以後無復著錄者則其書佚于彼者久矣其見于我邦古書所徵引者滋野貞主秘府略殘帙有四事卷第八百六十四黍粟條各一事卷第八百六十六繡錦條各一事香藥鈔原無書名以所收止香部藥部假設此名不知選人據其跋語知初鈔時在永萬以前有三事杜若條蕙草條昌蒲條各一事楚金事載兩唐書忠義傳中云少有志行與兄越石同舉進士歷仕高宗武后為酷吏周興所構配死領表所著翰苑三十卷外有紳誡三卷亦出新唐志雜家類今亦不傳雍公叡仕履無可考然祕府略成于天長八年而所引翰苑各條皆有注則其人在太和以前可知矣其書體制甚近于吳淑事類賦但其時先於淑則淑實仿楚金等書為之而其典實竟不及也書經傳寫譌奪滿紙往往至不可句其兩越條末至西域條首失去若干行故中間西羌條全闕無一字然已為天壤間孤本其所援引司馬彪續漢書王琰宋春秋漢名臣奏魚豢魏略高驪記崔鴻十六國春秋梁元帝職貢圖隋東藩風俗記魏王泰括地志東夷記肅慎國記陸劌鄴中記諸書皆千年已佚之舊帙賴有此書獲摭拾殘簡以備篤古者之輯錄其已有輯本者亦今之所出非皆昔之所經錄乃今世通行之書如前後漢書魏志應劭風俗通亦頗有異文佚章可資考鏡今略舉數條於左鮮卑條引王琰宋春秋著錄於隋書經籍志古史類新唐書藝文志編年類章宗源隋志考證引初學記太平御覽三事並無鮮卑事又引漢名臣奏著錄於隋志刑法類總集類新舊唐志刑法類隋刑法類作漢名臣奏事新唐志又別有陳壽漢名臣奏事章氏考證所引史記集解漢書注後漢書注文選注武后臣軌初學記藝文類聚太平御覽諸書十數事並無鮮卑事又引應劭風俗通今本亦無鮮卑事夫餘條引後漢書北夷橐離國不作索離槀離後漢書作索離魏志引魏略作槀離與太平御覽合以六畜名官中有豬加今本所無又引魚豢魏略東接挹婁下有即肅慎國者也六字蓋雍公叡注此書時所加未必魏略舊文高麗條引魏略舉五部異名與後漢書東夷傳注新唐書合而以五色配部名則加詳焉內部姓高雖為王宗列在東部之下古書記高麗舊俗者所未道及尤為有益考徵今西助教授疑其出於高麗記若括地志決非魏略舊語參之後漢書注信然大抵夫餘三韓高麗百濟肅慎倭國各條所引魏略文皆與今魏志相出入可知陳壽作書時多襲魚豢舊文而其間有異同之處每每可資以訂譌又引漢書地理志樂浪郡屬諸縣有夭祖今本作夫租那珂白鳥箭內三博士嘗考證漢志疑其誤寫讀此書方知三君之精審長岑原脫岑字今以意補駟望下有封箕子縣也五字今漢志無之引高麗記又作高驪記新舊唐志有奉使高麗記一卷未知即此書否其記建官九等實隋書新舊唐書所本然皆觕略至其國語官名舊書一無所舉新書粗舉一二便有批誤未如此書翔實可以考高麗古言其記南蘇城云在新城批作雜城今據新舊唐書高麗傅及遼東行部志訂正北七十里山上王寂遼東行部志引韓穎瀋州記以為新城即瀋州按即今奉天也迤北七十里當在懿路范河左右漢志南蘇水亦當以懿路河若范河蓋鉅燕作長城自造陽達襄平秦漢邊塞率由舊規故蘇水之經塞外距襄平不甚遠也箭內博士嘗考南蘇為今山城子與高麗記不合其以不耐城為今名國內城本漢不而縣與下引十六國春秋為丸都即不耐城皆可備一說金富軾三國史記引括地志與此同其記故城南門有碑後漢耿夔所建亦屬異聞又記馬多山焉骨山銀山三事皆古書所無記馬訾水乃通典所本又引南齊書東夷傳記銀山可補今本闕文又記其俗拜曳一腳亦今本所闕然其法俗與隋書高麗傳合又引後漢書有馬甚小亦今本所無通典云其馬皆小或本此也又引梁元帝職貢圖著錄於舊唐志地理類張彥遠歷代名畫記言乃梁元帝畫外國酋渠諸蕃土俗本末仍各圖其來貢者之狀章氏隋志考證補錄是書引藝文類聚二事新羅條引括地志云按新羅有國在晉宋之間以倭王彌宋書作珍通宋時所自稱為證可謂精確引南齊書下有雍公叡按語云今訊新羅耆老云加羅任那昔為新羅所滅其故今並在國南七八百里此新羅有辰韓卞辰廿四國及任那加羅慕韓之地也得之當時親所覩聞故鑿鑿有據如此引隋東藩風俗隋記今志止有諸蕃風俗記然通典邊防門所記實本于此其注亦明引隋東藩風俗記則當時此書自別行也百濟條引東夷記隋唐志並不著錄引括地志多與北史合然其記國都至五方各城里數記國中名山大川亦北史所不及也肅慎條引魏略肅慎國記陸翽鄴中記山海經綜而合之頗與晉書肅慎傳近然所引魏略文又略同太平御覽所引肅慎國記文中肅慎西接冠漫行國亦惟晉書有其語晉書作寇漫汗國晉書裨離等十國傳又有寇莫汗國遠在肅慎西北蓋皆本于肅慎記則此條所引魏略殆肅慎記之譌肅慎記隋唐志皆不著錄鄴中記今有乾隆四庫館臣輯本續百川學海本而並無此所引事惟晉書通典所記近之倭國條引後漢書安帝永初元年有倭面上國王師升至與藤兼良日本紀纂疏引東漢書合引魏略女王之南又有狗奴國與太平御覽引魏志合可證後漢書以拘奴國為在女王國海東之非雍氏按語云其王姓阿每其國號為阿輩雞彌脫其國之其及彌今補訂華言天兒也與通典合又云王長子號和哥彌多弗利華言太子隋書北史並作利哥彌多弗利藤貞幹好古日錄云嘗見古本北史利作和西土印刻誤耳古本北史未聞有其書貞幹所言未可輕信但改利作和實有所見蓋以其精通國典能以臆正傳本之誤也引括地志官有十二等一曰麻卑兜吉寐華言大德日本紀聖德太子所定冠位十二階無國讀可徵因此佚篇獲知當日設官實有國名非徒仿西制和田博士英松已有考說載于史學雜誌矣此書佳處多不勝舉姑據見聞所及參互鉤稽以見其所以宜寶重而未可摘其小疵以橫加詆訶云大正十一年三月內藤虎
