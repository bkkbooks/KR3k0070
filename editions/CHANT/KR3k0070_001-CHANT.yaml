body:
  text: 後敘後敘敘曰余以大唐顯慶五年三月十二日癸丑晝寢于并州太原縣之廉平里焉夢先聖孔丘被服坐於堂皇之上余伏於座前而問之曰夫子胡為而制春秋乎余兄越石在側曰夫子感麟而作耳余曰夫子徒以感麟為名耳其深旨何必在麟耶子曰然于時政道陵夷禮樂交喪故因時事褒善貶過以示一王之法豈專在於麟乎余又問論語云浴乎沂風乎舞雩詠而歸敢問何謂也子曰亦各言其志也余又問曰人之生也有夭壽乎子曰爾謂古之聖今之愚為壽乎為夭乎對曰古今一死也孰知其夭壽子曰然夫不死不生者自絕云住在生死之域則彭祖與殤子亦無以異也余又問曰夫子周人也奚為尚也存乎夫子囅然而笑曰非爾所及也余又問曰夫子聖者也亦有居止之所乎乃指東牖下曰吾居是矣余顧東牖前有玄縵朱裏床上以鋪緋褥有二侍者立於前言終而寤懼焉而興喟然而歎曰昔夫子大聖也尚稱曰吾衰也久矣不復夢見周公余小子何知焉而神交於將聖感而有述遂著是書焉
