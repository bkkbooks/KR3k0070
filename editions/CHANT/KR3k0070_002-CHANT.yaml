body:
  text: 匈奴周稱玁狁焦穫致三捷之功毛詩云文王之時西有昆夷之患北有玁狁之難以天子之命命將率靡室靡家玁狁之故不遑啟居玁狁之故戎車既駕四牡業業豈敢定居一月三捷注云將率之志往至征戍之地則庶乎一月之中三有勝功謂侵也戰也又曰玁狁匪茹整居焦穫侵鎬及方注云焦穫周地接玁狁者言玁狁之東侵乃整居焦穫據周之地也漢曰匈奴平城表七重之暈漢書曰匈奴其先夏后氏之苗裔也曰淳維唐虞以上有山戎獫狁薰粥居于北邊隨草畜牧而轉移史記天官書曰昴曰髦頭胡星也高祖平城之圍月暈參畢七重時士卒七日不食者也涇陽晝晦為掩胡塵毛詩曰周宣王時玁狁孔熾侵鎬及方至於涇陽元戎十乘以先啟行薄伐玁狁至于太原周幽王時居涇渭之間胡塵晝晦也甘泉夜明由通朔燧漢書曰軍臣單于立四歲匈奴復絕和親大入上郡雲中各三萬騎所殺略甚眾於是漢使三將軍軍屯北地代屯句注趙屯飛狐口緣邊亦各堅守以備胡寇又置三將軍軍長安西細柳渭北棘門霸上以備胡胡騎人代句注邊烽火通於甘泉長安數月夜皆明漢兵至邊匈奴亦去遠塞漢兵亦罷百金成列李牧收勳於雁門史記曰李牧為趙邊將常居代雁門備匈奴以便宜置吏市租皆輸入莫府為士卒費日殺牛饗士謹烽火多間諜匈奴入盜即急入保不與戰數歲不亡失時皆以為怯趙王怒使人代將歲餘戰不利多亡失乃復遣李牧如舊數歲乃選百金之士五萬大破匈奴漢書云選百金之士十萬注云良直百金之士也二部分驅耿譚馳聲於塵塞范曄後漢書南單于復上求滅北庭於是遣左谷蠡王等將左右部八千騎出雞鹿塞中郎將耿譚遣從事將護之至涿邪山乃留輜重分為二部各引輕兵兩道襲之左部北過西海至河雲北右部從匈河水西繞天山南渡甘微河二軍俱會夜圍北單于單于大驚率精兵千餘人合戰單于被創墮馬復上將輕騎數十遁走僅而免脫得其玉璽獲閼氏及男女五人耿譚以新降者多上增從事十二人也連題上望帶十角以飛名須卜豪宗參四姓而標稱范曄後漢書曰匈奴俗歲有三龍祠常以正月五月九月上戊日祭天神南單于既內附兼祠漢帝因會諸部議國事走馬及駱駝為樂其大臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右溫禺鞮王次左右斬將王是為六角皆單于子弟當為單于者也異姓大臣左右骨都侯次左右尸逐骨都侯其餘日逐且渠當戶諸官號各以權力優劣部眾多少為高下次第焉單于姓虛連題異姓有呼衍氏須卜氏丘林氏蘭氏四姓為國中名族常與單于婚姻呼衍氏為左蘭氏須卜氏為右主理獄聽訟當決輕重口白單于無文書簿領與之也和親結好事藉劉敬之謀漢書曰高祖時匈奴冒頓兵強控弦三十萬騎數苦北邊帝問敬敬曰天下初定士卒罷於兵革未可以武服也陛下誠能以適長公主妻單于為閼氏使辯士風諭以禮節冒頓在固為子壻死外孫為單于豈聞外孫與大父亢禮哉可毌戰以漸臣也帝欲遺長公主呂氏泣諫乃止而使家人子為公主妻單于使敬結和親約為兄弟也備塞勸農本資緜錯之策漢書曰文帝時匈奴數寇邊太子家令緜錯上兵事三章又言守邊備塞勸農力本當代急務二事曰夫胡貉之地積陰之處木皮三寸冰厚六尺食肉而飲酪其人密理而能塞故人非有城郭田宅之歸居如飛鳥走獸於廣野美草甘水則止草盡水竭則移此胡人之生業而中國之所以離南畝也今使胡人轉牧行獵於塞下親附之歡班固議曰漢興以來曠世歷年兵纏夷狄尤事匈奴綏御之方其塗不一或修文以和之或用武以征之或卑下以就之或臣服而致之雖屈申無常所因時異然未有拒絕棄放不與交接者也臣愚以為宜依故事復遣使者虜使再來然後一往既明中國主在忠信且聖朝禮義有常豈可逆詐示猜孤其善意乎絕之未知其利通之未聞其害設使北虜稍強能為風塵方復求為交通將何所及按前漢書緜錯傳今使胡人轉牧行獵於塞下下接或當燕代或當上郡北地隴西以候備塞之卒云云一段方是備塞勸農正文本書引至塞下句而止是於前漢書原文有脫漏也又塞下句下接以親附之歡句按後漢書班固傳章帝時北單于遣使貢獻求欲和親詔問群僚議者或以為匈奴變詐之國無內向之心徒以畏漢威靈逼憚南虜故希望報命以安其離畔今若遣使恐失南虜親附之歡而成北狄猜詐之計不可固議曰云云則本書引後漢書亦有脫漏也且一事引據兩書前後意義詞句均失連絡此兩文過脈處尤有脫漏也戰車臨塞驗九世之逾彊後漢書曰光武廿五年遣左賢王莫將兵萬餘人擊北單于弟薁鞬左賢王生獲之又破北單于帳下并得其眾萬餘人馬七千匹牛羊十萬頭北單于震怖卻地千里初帝造戰車可駕數牛上作樓櫓置於塞上以拒匈奴時人見者或相謂曰讖言漢九世當卻北狄地千里豈謂此邪及是果拓地焉也文馬伏閑知五侯之慕化後漢書曰光武二十六年詔乃聽南單于入居雲中遣使上書獻駱駝二頭文馬十匹夏南單于所獲北虜薁鞬左賢王將其眾及南部五骨都侯合三萬餘人叛歸去北庭三百餘里共立薁鞬左賢王為單于月餘日更相攻擊五骨都侯皆死左賢王遂自殺諸骨都侯子各擁兵自守云云也西河置部骨都之陣猶長後漢書曰南單于既居西河亦列置諸部王助為扞戍使韓氏骨都侯屯北地右賢王屯朔方當于骨都侯屯五原呼衍骨都侯屯雲中郎氏骨都侯屯定襄左南將軍屯雁門栗籍骨都侯屯代郡皆領部眾為郡縣偵羅耳目北單于惶恐頗還所略漢人以示善意鈔兵每到南部下還過亭侯輒謝曰自擊亡虜薁鞬日逐耳非敢犯漢人也朔方列隊溫禺之氛自解後漢書曰明帝永平十六年乃大發緣邊兵遣諸將四道出塞北征匈奴南單于遣左賢王信隨太僕祭彤及吳棠出朔方高闕攻皋林溫禺犢王於涿邪山虜聞漢兵來悉度漠去之者也逢侯縱暴取敗於滿夷後漢書曰永元六年諸雜降胡遂相驚動十五部二十餘萬人皆反叛脅立前單于屯屠何子薁鞬日逐王逢侯為單于遂殺略吏人燔燒郵亭廬帳將軍重向朔方欲度漠北於是烏桓校尉任尚率鮮卑大都護蘇拔廆烏桓大人勿柯八千騎要擊逢侯於滿夷谷復大破之前後凡斬萬七千餘級逢侯遂率眾出塞也薁鞮抗衡退兇於美稷後漢書曰伊陵尸逐就單于居車兒建和元年立至永壽元年匈奴左薁鞮臺耆且渠伯德等復叛寇鈔美稷安定屬國都尉張奐擊破降之也柏城有備杜崇之效克宣後漢書中郎將杜崇度遼將軍朱徽等上言南單于安國疎遠故胡親近新降右部降者謀共迫脅安國起兵背叛請為之儆備帝從之於是崇徽遂發兵造其庭安國夜聞漢軍至大驚棄帳而去因舉兵反將誅右谷蠡王師子師子先知乃悉將廬落入曼柏城安國追到城下門閉不得入杜崇等遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急安國舅骨都侯喜為等慮并被誅乃格殺安國也涿邪懷疑龐奮之功攸著後漢書永元七年以雁門太守龐奮行度遼將軍逢侯於塞外分為二部自領右部屯涿邪山下左部屯朔方西北相去數百里八年冬左部胡自相疑叛還入朔方塞龐奮迎受慰納之其勝兵四千人弱小萬餘口悉降以分處北邊也句龍傳首方申馬寔之威後漢書永和五年句龍吾斯等立句龍王車紐為單于東引烏桓西收羌戎及諸胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂寇掠并涼幽冀四州漢安二年中郎將馬寔募刺殺句龍吾斯送首洛陽建康元年進擊餘黨斬首千二百級匈奴烏桓七十萬餘口皆詣寔降車重牛羊不可勝數單于跣足始驗韓琮之策後漢書曰永初三年夏漢人韓琮隨南單于入朝既還說南單于云關東水潦人民飢餓死盡可擊也單于信其言遂起兵反叛攻中郎將耿種於美稷遣車騎將軍何熙副中郎將龐雄西域校尉梁慬遼東太守耿夔等擊破之單于見諸軍並進大恐怖顧讓韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之單于脫帽徒跣對龐雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所略轉賣入匈奴中者合萬餘人攣鞮乘統實標廣大之名漢書曰自淳維以至頭曼千有餘歲時大時小別散分離尚矣其世傳不可得而次然至冐頓而匈奴最強大盡服從北夷而南與諸夏為敵國其世姓官號可得而記云單于姓攣鞮氏其國稱之曰撐犂孤塗單于匈奴謂天為撐犂謂子為孤塗單于者廣大之貌也言其象天單于然也置左右賢王左右谷蠡王左右大將左右大都尉左右大當戶左右骨都侯也屠耆繼體允屬賢良之寄漢書曰匈奴謂賢曰屠耆故常以太子為左屠耆王自左右賢以下至當戶大者萬餘騎小者數千凡二十四長立號曰萬騎其大臣皆世官呼衍氏蘭氏其後有須卜氏此三姓其貴種也諸左王將居東方直上谷以東接穢貉朝鮮右王將居西方直上郡以西接氐羌而單于庭直代雲中各有分地逐水草移徙而左右谷蠡最為大國左右骨都侯輔政諸二十四長亦各自置千長百長什長裨小王相都尉當戶且渠之屬也繞林課校龍城之敬逾深漢書曰匈奴以歲正月諸長小會單于庭祠五月大會龍城祭其先天地鬼神秋馬肥大會蹛林課校人畜計注云秋社八月中皆會祭處又曰蹛者繞也言繞林木而祭也其法拔刃尺者死坐盜者沒入其家有罪小者軋大者死獄久者不滿十日一國之囚不過數人而單于朝出營拜日之始生夕拜月其坐長左而北向日上戊己其送死有棺槨金銀衣裳而無封樹喪服也候月稱兵鳥集之機無爽漢書匈奴舉事常隨月盛壯以攻戰月虧則退兵其攻戰斬首虜賜一巵酒而所得鹵獲因以予之得人以為奴婢故其戰人人自為趨利善為誘兵以包敵故其逐利如鳥之集其困敗則瓦解雲散矣戰而扶轝死者盡得死者家財也駹驪疊躍結蟻眾於白登漢書曰漢初高帝悉兵多步兵三十二萬北逐匈奴高帝先至平城步兵未盡到冐頓縱精兵三十餘萬騎圍高帝於白登七日白登在平城東南去平城十餘里漢兵中外不得相救餉匈奴騎其西方盡白東方盡駹北方盡驪南方盡騂馬駹青馬驪梁黑也高帝迺使使間厚遺閼氏閼氏迺謂冒頓曰兩主不相困今得漢地單于終非能居之且漢主有神單于察之冐頓遒開圍一角於是高皇帝令士皆持滿傅矢外鄉從解圍角直出得與大軍合也金貝駢羅葉蕃情於新望漢書曰文帝時單于奉書請獻橐駝一騎馬二駕二駟皇帝即不欲匈奴近塞則且詔吏民遠舍使者至即遣之六月中來至新望之地書至漢議擊與和親孰便公卿皆曰和親便乃遺書云云服繡袷綺衣繡袷長襦錦袍各一比疎一黃金飭具帶一黃金犀毗一繡十匹錦二十匹赤綈綠繒各四十匹遺單于也眩雷為徼陸梁之跡已衰漢書曰烏維單于立而武帝始出巡狩親至朔方勒兵十八萬騎以見武節是時漢東拔穢貉朝鮮以為郡而西置酒泉郡以隔絕胡與羌通之路又西通月氏大夏以翁主妻烏孫王以分匈奴西方之援又北益廣田至眩雷為塞而匈奴終不敢以為言也浚稽且登款附之誠允著漢書曰漢使貳師將軍西伐大宛而令因杅將軍築受降城其冬匈奴大雨雪畜多飢寒死而單于年少新立好殺伐國中多不安左大都尉欲殺單于使人間告漢曰我欲殺單于降漢漢遠漢即來兵近我我即發初漢聞此言故築受降城猶以為遠其明年春漢使浞野侯破奴將二萬騎出朔方北二千餘里期至浚稽山而還也侯應十策利害之旨攸陳漢書曰元帝時甘延壽等誅郅支單于呼韓耶單于且喜且懼上書願謁見又願保塞上谷以西至敦煌傳之無窮請罷邊備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中侯應以為不可許上問狀應曰邊長老言匈奴失陰山之後過之未嘗不哭也如罷備塞戍卒示夷狄之大利不可一也今聖德廣被天覆匈奴匈奴得蒙全活之恩稽首來臣夫夷狄之情困則卑順彊則驕逆天性然也前以罷外城省亭隧今裁足以候望通烽火而已古者安不忘危不可復罷二也中國有禮義之教刑罰之誅愚民猶尚犯禁又況單于能必其眾不犯約哉三也自中國尚建關梁以制諸侯所以絕臣下之覬欲也設塞徼置屯戍非獨為匈奴而已亦為諸屬國降民本故匈奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜產妻子以此怨恨起而背畔世世不絕今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多曰聞匈奴中樂無奈候望急何然時有亡出塞者七也盜賊桀黠群輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落谿谷水門稍稍平之卒徒築治功費久遠不可勝計臣恐議者不深慮其終始欲以一切省徭戍十年之外百歲之內卒有他變障塞破壞亭隧滅絕當更發屯繕治累世之功不可卒復九也如罷戍卒省候望單于自以保塞守禦必深德漢請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長策也對奏天子有詔勿議罷邊塞事使車騎將軍口諭單于云云也嚴尤五難得失之機斯在漢書曰王莽篡位發三十萬眾齎三百日糧同時十道並出窮追匈奴莽將嚴尤諫曰今天下遭陽九之戹比年饑饉西北邊尤甚發三十萬眾具三百日糧東援海代南取江淮然後乃備計其道里一年尚未集合兵先至者聚居暴露師老械弊勢不可用此一難也邊既空虛不能奉軍糧內調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝牛又當自齎食加二十斛重矣胡地沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎鬴鍑薪炭重不可勝食糧糒飲水以歷四時師有疾疫之憂是故前世伐胡不過百日非不欲久勢力不能此四難也輜重自隨則輕銳者少不得疾行虜徐遁逃勢不能及幸而逢虜又累輜重如遇險阻銜尾相隨虜要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆擊且以創艾胡虜莽不聽尤言天下騷動也崇基夙樹疏遠系於強胡餘類尚南創雄名於桓嶠范曄後漢書曰烏桓者本東胡也漢初匈奴冒頓滅其國餘類保烏桓山因以為號焉初東胡強盛輕冒頓從索閼氏寶馬匈奴皆與之而不為備冒頓破滅之穹廬寢息資拜日以訓恭後漢書曰烏桓俗善騎射弋獵禽獸為事隨水草放牧居無常處以穹廬為舍開向日皆東拜日食肉飲酪以毛毳為衣貴少而賤老其性悍塞怒則殺父兄而終不害其母以母有族類父兄無相仇報故也邑落徵科因刻木而昭信後漢書曰烏桓俗其有勇健能理決鬭訟者推為大人無業相繼邑落各有小帥數百千落自為一部大人有所召呼則刻木為信雖無文字而部眾不敢違犯氏姓無常以大人健者名字為姓大人以下各自畜牧營產不相徭役之也刺韋成繡爰示女功鍛鐵為兵用標男伎後漢書曰烏桓俗計謀從用婦人戰鬭之事乃自決之父子男女相對踞蹲以髡頭為輕便婦人至嫁乃養髮分為髫著句決飾以金碧猶中國有幗步搖也婦人能刺韋作文繡織氀毼男子能作弓矢鞍勒鍛金鐵為兵器也饋馬牛以交二族後漢書曰烏桓俗其嫁娶則先略女通情或半歲百日然後送牛馬羊畜以為聘幣壻隨妻還家妻家無尊卑旦旦拜之而不拜其父母為妻家僕役一二年間妻家乃厚遣送女居處財物一皆為辦其俗妻後母報寡嫂也觀鳥獸而別四時後漢書曰烏桓土地宜穄及東牆東牆似蓬草實如穄子至十月而熟見鳥獸孕乳以別四時即耕種用布穀鳴為候之也族茂白山假修蛇而示譴後漢書曰烏桓在上谷塞外白山者最為強富又曰其約法違大人言者罪至死若相賊殺者令部落自相報相報不止詣大人告之聽出馬牛羊以贖死其自殺父兄則無罪若亡叛為大人所捕者邑落不得受之皆徙逐於雍狂之地沙漠之中其土多蝮蛇在丁令西南烏孫東北魂遊赤嶺資護犬以禳邪後漢書曰烏桓俗貴兵死斂屍以棺有哭泣之哀至葬則歌舞相送肥養一犬以綵繩纓牽并取死者所乘馬衣物皆燒而送之言以屬累犬使護死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也敬鬼神祠天地日月星晨山川及大人有健名者祠用牛羊畢皆燒之建武之中郝且詣闕後漢書曰建武廿五年遼西烏桓大人郝且等九百二十二人率眾向化詣闕朝貢獻奴婢牛馬及弓虎豹貂皮是時四夷朝賀絡繹而至天子乃命大會勞饗賜以珍寶烏桓或願留宿衛於是封其渠帥為侯王君長者八十一人皆居塞內布於緣邊諸郡令招來種人給其衣食遂為漢偵候也永初之際無何獻誠後漢書曰永初三年秋雁門烏桓率眾王無何與鮮卑大人丘倫等寇五原與太守戰於九原高渠谷漢兵大敗殺郡長吏乃遣車騎將軍何熙度遼將運梁慬等擊大破之無何乞降鮮卑走還塞外是後烏桓稍復親附拜其大人戎朱廆為漢都尉也耿曄申威翻致蘭池之窘後漢書曰順帝時烏桓寇雲中遮截道上商賈車千餘輛度遼將軍耿曄率二千餘人追擊不利又戰於沙南斬首五百級烏桓遂圍曄於蘭池城於是發積射士二千人度遼營千人配上郡屯以討烏桓烏桓乃退也劉虞購募遂摧丘力之謀後漢書曰靈帝初烏桓大人上谷有難樓者眾九千餘落遼西有丘力居者眾五千餘落皆自稱王又遼東蘇僕延眾千餘落自稱峭王右北平烏延眾八百餘落自稱汗魯王並勇健而多計策中平四年前中山太守張純叛入丘力居眾中自號彌天安定王遂為諸郡烏桓元帥寇掠青徐幽冀四州五年以劉虞為幽州牧虞購募斬純首北州乃定者也魏武揚旌先梟蹋頓孫康杖節遽斬樓班後漢書曰獻帝初平中丘力居死子樓班年少從子蹋頓有武略代立總攝三郡眾皆從其號令後難樓蘇僕延率其部眾奉樓班為單于蹋頓為王時袁紹子尚敗奔蹋頓幽冀吏人奔烏桓者十萬餘戶建安十二年魏武自征烏桓大破蹋頓於柳城斬之首虜二十餘萬人袁尚與樓班烏延等皆走遼東遼東太守公孫康並斬送之其餘眾萬餘落悉徙居中國云也依山構緒接流東胡之源司馬彪續漢書曰鮮卑者亦東胡之支也別依鮮卑山故因號焉其言語習俗與烏桓同也附塞疏枝嗣德左賢之胄王琰宋春秋曰赫連者鮮卑別種本匈奴左賢王後也祖衛臣仕塞表地鄰遼碣境接燉煌續漢書曰鮮卑其地東接遼水西當西域自為匈奴冒頓所破遠竄遼東塞外與烏桓相接未嘗通中國光武時南北單于更相攻伐匈奴損耗而鮮卑遂盛自燉煌酒泉以東邑落大人皆詣遼東受賞賜弓貴角端裘珍鼲毳後漢書曰鮮卑地禽獸異於中國者有野馬原羊角端牛以角為弓俗謂之角端弓也又有貂豽鼲子皮毛柔蝡故天下以為名裘之也結歡饒浦素尚髡頭之姿後漢書曰鮮卑與烏桓同唯婚姻先髡頭以季春月大會於饒樂水上飲宴畢然後配合者也背役長城仍傳赭衣之俗漢名臣奏曰鮮卑者秦始皇遣蒙恬築長城徒亡出塞始皇謂人鮮少者卑者陋也言其種眾少陋也後稍昌熾東西萬餘里今其人皆髡頭衣赭手足麤腫此為徒人狀也鳥飛寇掠猶歸建武之仁應劭風俗通曰鮮卑數為邊害來如飛鳥去如絕弦國家深以為憂後漢書云光武建武三十年鮮卑大人於仇賁滿頭等率種人詣闕朝賀慕義內屬帝封於仇賁為王滿頭為侯也蟻聚貪殘尚感永平之化風俗通曰秦始皇遣蒙恬築長城徒工亡出依鮮卑山後逐繁息因以為號起自遼東西至燉煌萬餘里蟲熾蟻聚天性忿鷙易報以惡無籬落之居君長之師後漢書曰明帝永平元年鮮卑大人皆來歸附並詣遼東受賞賜青徐二州給錢歲二億七千萬為常明章二世保塞無事祭彤作鎮納誠款而收功後漢書曰建武二十一年鮮卑與匈奴入遼東遼東太守祭彤擊破之斬獲殆盡由是震怖及南單于附漢北虜孤弱二十五年鮮卑始通驛使其後都護偏何等謁祭彤求自效功因令擊北匈奴左伊育訾部斬首二千餘級其後偏何連歲出兵擊北虜還輒持首級詣遼東也張顯臨邊違直言而致敗後漢書曰延平元年鮮卑復寇漁陽漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊勢難量宜且結營先令輕騎偵視之顯意甚銳怒欲斬授因復進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死顯中流矢主簿衛福功曹徐咸皆自投赴顯俱歿於陣永初之築二部醜類猶迷後漢書曰安帝永初中鮮卑大人燕荔陽詣闕朝賀鄧太后賜燕荔陽王印綬赤車參駕令止烏桓校尉所治甯城下通胡市因築南北兩部質館鮮卑邑落百二十部各遣入質是後或降或叛與匈奴烏桓更相攻擊後遼東鮮卑圍無慮縣州郡合兵固保清野鮮卑無所得復攻扶黎營殺長吏建光之分兩路重圍僅解後漢書曰建光元年鮮卑大人烏倫其至鞬復叛寇居庸雲中太守成嚴擊之兵敗鮮卑於是圍烏桓校尉徐常於馬城度遼將軍耿夔與幽州刺史龐參發廣陽漁陽涿郡甲卒分為兩道救之常夜得潛出與夔等并力並進攻賊圍解慶隆吞雹方循彈嶺之儀後漢書曰桓帝時鮮卑檀石槐者其父投鹿侯初從匈奴軍三年其妻在家生子投鹿侯歸怪欲殺之妻言嘗晝行聞雷震仰天視而雹入其口因吞之遂妊身十月而產此子必有奇異且宜長視投鹿侯不聽遂棄之妻私語家令收養焉名檀石槐年十四五勇健有智略異部大人抄取其外家牛羊檀石槐單騎追擊之所向無前悉還得所亡者由是部落畏服乃施法禁平曲直無敢犯者遂推以為大人檀石槐乃立庭於彈汗山歠仇水上去高柳北三百餘里兵馬甚盛東西部大人皆歸焉因南抄緣邊北摧丁零東卻夫餘西擊烏孫盡據匈奴故地東西萬四千餘里南北七千餘里網羅山川水澤鹽池甚廣績表觀魚自頓秦池之網後漢書曰元和元年鮮卑寇酒泉緣邊莫不被毒種眾日多田畜射獵不足給食檀石槐乃自徇行見烏集秦水廣縱數百里水停不流其中有魚不能得之聞倭人善網捕於是擊倭國得千餘家徙置秦水上令捕魚以助糧食光和中檀石槐死孫騫曼年小兄子魁頭立後騫曼長大與魁頭爭國眾遂離散也氣降清旻入橐離而結孕祥流穢地躍㴲水以開疆後漢書曰夫餘國本穢地也初北夷橐離國王出行其侍兒於後妊身王還欲殺之侍兒曰前見天上有氣大如雞子來降我因以有身王囚之後遂生男王令置於豕牢豕以口氣噓之不死復徙於馬蘭馬亦如之王以為神乃聽母收養名曰東明東明長而善射王忌其猛復欲殺之東明奔走南至掩㴲水以弓擊水魚鼈皆聚水上東明乘之得渡因至夫餘而王之焉南接句驪東鄰肅慎魚豢魏略曰夫餘國在長城北去玄莬千餘里南接句驪東接挹婁即肅慎國者也四加在列五穀盈疇赤玉可珍黑貂斯貴後漢書曰夫餘於東夷之域最為平敞土宜五穀出名馬赤玉貂豽大珠如酸棗以員柵為城有宮室倉庫牢獄其人麤大強勇而謹厚不為寇抄以弓矢刀矛為兵以六畜名官有馬加牛加狗加豬加其邑落皆主屬諸加魏略曰衣尚白衣錦繡文罽白黑貂為裘譯人傳辭皆跪手據地其被殺者沒其家人為奴婢盜一者責十二男女淫婦妬皆殺之樂從迎鼓舞詠之趣方遙後漢書曰夫餘食用俎豆會同拜爵洗爵揖讓升降以臘月祭天大會連日飲食歌舞名曰迎鼓是時斷刑獄解囚徒也俗葉占蹄吉兇之旨斯見魏略曰夫餘俗有軍事殺牛祭天以牛蹄占吉兇牛蹄解者為兇合者為吉死者以生人殉葬居喪去珮大體與中國相髣髴也行人無晝夜好歌吟音聲不絕也占風入貢增印綬之榮後漢書曰永寧元年夫餘乃遣嗣子尉仇台詣闕貢獻天子賜尉仇台印綬金帛等也沐化來朝預歌鍾之會後漢書曰順帝永和元年夫餘王來朝京師帝作黃門鼓吹角抵戲以遣之也境連鯷壑地接鼇波魏略曰韓在帶方南東西以海為限地方四千里一曰馬韓二曰辰韓三曰弁韓辰韓古之辰國也馬韓在其西其人土著種植知蠶桑作綿布鯷壑東鯷人居海中州鼇波俱在海中也南接倭人北鄰穢貊後漢書曰韓有三種馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其北與穢貊接弁韓在辰韓之南亦有十二國其南亦與倭接凡七十八國伯濟是其一國焉職標臣智都號目支魏略曰三韓各有長帥其置官大者名臣智次曰邑借凡有小國五十六總十餘萬戶辰王治目支國目支國置官亦多曰臣智後漢書云大者萬餘戶小者數千家各在山海間皆古之辰國也馬韓最大共立其種為辰王都目支國盡王三韓之地其諸國王先皆是馬韓種人焉飾重綴珠不珍金罽之美後漢書曰馬韓人不貴金寶錦罽不知騎乘牛馬唯重瓔珠以綴衣為飾及懸頸垂耳大率皆魁頭露紒布袍草履也居崇仰戶詎資城郭之華後漢書曰馬韓人知田蠶作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作室形如冢開戶在上不知跪拜無長幼男女之別尚勇標健貫脊之風猶扇後漢書曰馬韓人壯勇少年有築室作力者輒以繩貫脊皮縋以大木懽呼為健不以為痛也矜容表麗扁首之俗仍存魏略曰辰韓俗喜歌舞彈瑟瑟形似筑兒生欲其頭扁便以石押其頭今辰韓人皆扁頭亦文身施竈皆在戶西其瀆盧國與倭界接其人形皆大衣服潔淨也鈴鼓既懸用展接神之體後漢書曰馬韓人常以五月田竟祭鬼神晝夜酒會群聚歌舞輒數十人相隨蹋地為節十月農功畢亦復如之諸國邑各以一人主祭天神號為天君又立蘇塗建大木以懸鈴鼓事鬼神蘇塗之義有似於西方浮圖鳥羽彼設方盡送往之儀魏略曰辰韓人用馬韓人作主代代相乘其地宜五穀善作縑布服牛乘馬其俗嫁娶男女有別以大鳥羽送死其意欲使死者飛颺居城識秦人之風髡髮驗州胡之俗後漢書曰辰韓耆老自言秦之亡人避苦役適韓國馬韓割東界地與之其名國為邦弓為弧賊為寇行酒為行觴相呼為徒有似秦語故或謂之秦韓有城柵屋室諸小別邑各有渠帥大者名臣智次有儉側次有樊秪次有殺奚次有邑借土地肥美宜穀知蠶桑作縑布乘駕牛馬嫁娶以禮行者讓路國出鐵穢倭馬韓並從市之凡諸貿易皆以鐵為貨弁韓與辰韓雜居城郭衣服皆同言語風俗有異其人形皆長大美髮衣服潔淨而刑法嚴峻馬韓之西海島上有州胡國其人短小髡頭衣有上無下好養牛豕乘船往來貨市韓中也靈河演貺照日影以含胎伏鼈摛祥叩骨城而闢壤魏收後魏書曰高句驪者出於夫餘自言先主朱蒙朱蒙母河伯女為夫餘王閉於室中為日所照引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與犬犬不食棄之與豕豕又不食棄之於路牛馬避之又棄之於野眾鳥以毛茹之夫餘王剖之不能破還其母其母以物裹之置於暖處有一男破殼而出及其長也字之曰朱蒙其俗言朱蒙者善射也夫餘國人以朱蒙非人所生將有異志請除之王不聽命之養馬朱蒙每私試知有善惡駿者減食令瘦駑者善養令肥夫餘王以肥者自乘以瘦者給朱蒙後狩於田以朱蒙善射限之一矢朱蒙雖一矢殪獸甚多夫餘之臣又謀殺之母陰知以告朱蒙蒙與烏引烏違等二人棄夫餘東南走中道遇一大水欲濟無梁夫餘人追之甚急蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鼈並浮為之成橋朱蒙得渡魚鼇乃解追騎不得渡朱蒙至普述水遇見三人其一人著麻衣一人著衲衣一人著水藻衣與朱蒙至紇升骨城遂居焉號曰高句驪因以為氏焉境連穢貊地接夫餘魚豢魏略曰高句驪國在遼東千里南接朝鮮穢貊東接沃沮北接夫餘也帶玄菟以開疆漢書地理志曰玄莬郡武帝元封四年開屬幽州應劭注云故真番朝鮮胡國領高句驪上殷臺西蓋馬三縣治高句驪後漢以遼東之高顯候城遼陽三縣來屬也括黏蟬而命邑漢書地理志曰樂浪郡武帝元封三年開莽曰樂鮮屬幽州應劭注云故朝鮮國也武王封箕子於朝鮮䛁邯浿水含資黏蟬遂成增地帶方駟望海冥列口長岑屯有昭明鏤方提奚渾彌吞列東不而蠶台華麗邪頭昧前莫夭祖二十五縣治朝鮮也仁隨萬物自扇九種之風漢書地志曰長岑駟望封箕子縣也後漢書曰王制云東方曰夷夷者柢也言仁而好生萬物柢地而出故天性柔順易以道御至有君子不死之國焉夷有九種曰畎夷于夷方夷黃夷白夷赤夷玄夷風夷陽夷故孔子欲居九夷也漢初燕人衛滿避地朝鮮因王其國百有餘歲云俗異三方猶祖八條之教漢書地理志曰朝鮮穢貉句驪蠻夷殷道衰箕子去之朝鮮教其人以禮義田蠶織作樂浪朝鮮民犯禁八條相殺以當時償殺相傷者以穀償相盜者男沒入為其家奴女為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所讎是以其民終不相盜無門戶之閉然天性柔順異於三方之外故孔子悼道不行設浮於海欲居九夷有以也官崇九等高麗記曰其國建官有九等其一曰吐捽比一品舊名大對盧總知國事三年一代若稱職者不拘年限交替之日或不相祇服皆勒兵相攻勝者為之其王但閉宮自守不能制禦次曰太大兄比二品一名莫何羅支次鬱折比從二品華言主簿次大夫使者比正三品亦名謁奢次皂衣頭大兄比從三品一名中裏皂衣頭大兄東夷相傳所謂皂衣先人者也以前五官掌機密謀政事徵發兵丁選授官爵次大使者比正四品一名大奢次大兄加比正五品一名纈支次拔位使者比從五品一名儒奢次上位使者比正六品一名契達奢使者一名乙耆次小兄比正七品一名失支次諸兄比從七品一名翳屬一名伊紹一名河紹還次過節比正八品次不節比從八品次先生比正九品一名失元一名庶人又有拔古鄙掌賓客比鴻臚卿以大夫使為之又有國子博士大學士舍人通事典客皆以小兄以上為之又其諸大城置傉薩比都督諸城置處閭比剌史亦謂之道使道使治所名之曰備諸小城置可邏達比長史又城置婁肖比縣令其武官曰大模達比衛將軍一名莫何邏繡支一名大憧主以皂衣頭大兄以上為之次未若比中郎將一名郡頭以大兄以上為之其領千人以下各有等級部貴五宗魏略曰其國大有五族有消奴部絕奴部順奴部灌奴部桂婁部本消奴部為主稍微弱桂婁部代之五部皆貴人之族也一曰內部即後漢書桂婁部一名黃部二曰北部即絕奴部一名後部又名黑部三曰東部即順奴部一名左部或名上部又名青部四曰南部即灌奴部一名前部又名赤部五曰西部即消奴部也一名右部其內部姓高即王族也高麗稱無姓者皆內部也又內部雖為王宗列在東部之下其國從事以東為首故東部居上饗帝列東盟之祠延神宗襚穴之醮魏略曰高麗俗好歌舞其人清潔自喜跪拜曳一腳以十月祭天國中大會名曰東盟有軍事亦各祭天殺牛觀蹄以占吉兇大加主著幘如幘而無後小加著折風形如弁其國東有大穴名襚穴十月國中大會迎襚神於國東而祭之無牢獄有罪則會諸加評議便殺之沒妻子為奴婢其俗淫侈相奔誘其死葬有槨無棺南蘇表戍驗客恪之先鳴南蘇城在國西北十六國春秋前燕錄曰慕容晃十二年遣度遼將軍慕容恪攻高麗南蘇克之置戍而還即此城也高麗記云城在新城北七十里山上也平郭開疆紀馮弘之失策高麗記曰平郭城今名建安城在國西本漢平城縣也漢書地理志曰屬遼東郡有鐵官鹽官續漢書郡國志不改十六國春秋曰北燕馮弘大興六年為魏所破遂奔句驪處弘于平郭即此城也王頎逐北銘勳不耐之城高麗記曰不耐城今名國內城在國東北六百七十里本漢不而縣也漢書地理志不而縣屬樂浪郡東部都尉治處後漢省魏志曰正始中毋丘儉征高麗遂束馬懸車以登丸都屠句驪所都斬獲首虜以千數六年復征之王宮遂奔買溝儉遣玄莬太守王頎追之過沃沮千有餘里至肅慎氏南界刻石紀功刊丸都之山銘不耐之城燕晃長驅表績丸都之嶠十六國春秋前燕錄曰燕主慕容晃九年伐句驪乘勝長驅遂人丸都句驪王釗單馬奔竄乃掘其父墓載其尸并母妻珍寶掠男女五萬餘口禁其宮室毀丸都而歸淪碑尚在耿夔播美於遼城范曄後漢書曰耿夔遷遼東太守元年貊人寇郡界夔追擊斬其渠帥案高麗記云故城南門有碑年久淪沒出土數尺即耿夔建之者也冠石猶存公孫創基於延里魏志曰公孫度遼東襄平人董卓時為遼東太守初平中襄平延里社生大石長丈餘下有三小石為之足或謂度曰此漢宣帝冠石之祥明當有土地乃分遼東郡為遼西中遼郡置太守越海收東萊諸縣置營州刺史自立為遼東侯平州牧立漢二祖廟承制設壇墠於襄平城南郊祀天地太祖表度為武威將軍封永寧鄉侯度曰我王遼東何永寧也度死至孫淵以景初元年自立為燕王置百官二年遣司馬宣王征淵累破之遂進軍造城下為圍塹起土山修櫓為發石連弩射城中淵窘急糧盡人相食死者甚多淵遂突圍東南走大兵急擊之斬其父子遼東悉平也馬多𡽱嶭出洞穴以霏雲高驪記曰馬多山在國北高驪之中此山最大三十里間難通輿馬雲霧歊蒸終日不霽其中多生人參白附子防風細辛山中有南北路路東有石壁其高數仞下有石室可容千人室中有二穴莫測深淺夷人長老相傳云高驪先祖朱蒙從夫餘至此初未有馬行至此山忽見群馬出穴中形小而駿因號馬多山也焉骨巉巖竦二峰而拱漢高麗記云焉骨山在國西北夷言屋山在平壤西北七百里東西二嶺壁立千仞自足至巔皆是蒼石遠望巉巖狀類荊門三峽其上無別草木唯生青松擢幹雲表高驪於南北峽口築斷為城此即夷藩樞要之所也珣玗挺耀授色重巒周禮職方曰東北曰幽州其山鎮醫無閭爾雅曰東北之美者有醫無閭之珣玗琪焉郭璞注云醫無閭山名今在遼東續漢書曰遼東無慮縣有醫無閭山也銀鑠涵輝凝鮮疊崿齊書東夷傳曰銀山在國西北高驪採以為貨高驪記云銀山在安市東北百餘里有數百家採之以供國用也波騰碧瀲騖天險以浮刀漢書地理志曰玄莬郡西蓋馬縣馬訾水西北入鹽難水西南至西安平入海過郡二行一千一百里應劭云馬訾水西人鹽澤高驪記云馬訾水高驪一名淹水今名鴨淥水其國相傳云水源出東北靺鞨國白山水色似鴨頭故俗名鴨淥水去遼東五百里經國內城南又西與一水合即鹽難也二水合流西南至安平城入高驪之中此水最大波瀾清澈所經津濟皆貯大船其國恃此以為天塹今案其水闊三百步在平壤城西北四百五十里也刀小船也毛詩曰誰謂河廣曾不容刀也浪接黃川藹樓雉而驚箭漢書地理志曰遼東郡望平縣大遼水出塞外其水西南流合契丹國黃水又西南經遼東城西八十里又南入海闊百餘步高驪記云其水闊百餘步平流清深又多灣潭枝派兩岸生長柳蒙密可藏兵馬兩畔彌平總名遼澤多生細草萑蒲毛群羽族朝夕相霧須臾卷斂狀若樓雉即漢書所謂蜃氣也獸珍文豹器重良弓高驪記曰今高驪國兼有朝鮮穢貊沃沮之地也後漢書曰高句驪多大山深谷人隨而為居句驪一名貊耳有別種依小水為居因名曰小水貊出好弓所謂貊弓是也東沃沮土地肥美背山向海宜五穀善田種穢出檀弓又多文豹有果下馬又有馬甚小登山履險不疲以栗米飲便得經日經日也佩刀礪而見等威飾金羽以明貴賤魏收後魏書東夷傳曰高驪頭著析風其形如弁傍插鳥羽貴賤有差立則反拱蕭子顯齊書東夷傳曰高驪俗服窮袴冠析風一梁謂之幘知讀五經使人在京師中書郎玉融戲之曰服之不衷身之災也頭上定是何物答曰此即古弁之遺像也其俗拜曳一腳受令跪必走以為恭梁元帝職貢圖云高驪婦人衣白而男子衣結錦飾以金銀貴者冠幘而無後以金銀為鹿耳加之幘上賤者冠析風穿耳以金環上白衣衫下白長袴腰有銀帶左佩礪而右佩五子刀足履豆禮㧺高驪記云其人亦造錦紫地纈文者為上次有五色錦次有雲布錦又有造白疊布青布而尤佳又造鄣曰華言接籬其毛即靺鞨豬髮也開源拓構肇基金水之年括地志云案宋書元嘉中倭王彌自稱使持節都督倭百濟新羅任那秦韓慕韓六國諸軍事此則新羅有國在晉宋之間且晉宋齊梁諸書並無正傳故其有國所由靡得詳也金水晉宋之口也宅壤疏疆創趾弁辰之域括地志曰新羅治金城本三韓之故地范曄後漢書曰韓有三種魏志曰韓在帶方之南東西以海為限南與倭接方可四千里馬韓在西辰韓在馬韓之東其耆老傳言古之亡人避秦役來適韓國韓割其東界地與之今案新羅白濟共有三韓之地百濟在西即馬韓之地新羅在東即辰韓弁辰之地也國苞資路魏志曰辰韓亦名秦韓始有六國稍分十二國弁辰亦十二國有已柢國不斯國弁辰彌離凍國弁辰接塗國勤耆國難彌離彌凍國弁辰古資彌凍國弁辰古淳是國冉奚國弁辰半路國弁樂奴國軍彌國弁軍彌國弁辰彌烏邪馬國如湛國弁辰甘路國戶路國州鮮國馬延國弁辰狗邪國弁辰走漕馬國弁辰安邪國卞辰瀆盧國斯盧國優中國弁辰韓合二十四國大國四五千家小國六七百家地總任那齊書云加羅國三韓種也今訊新羅耆老云加羅任那昔為新羅所滅其故今並在國南七八百里北新羅有辰韓弁辰二十四國及任那加羅慕韓之地也擁叛卒以稱強永附金而為姓括地志曰新羅王姓金氏其先所出未之詳也隋東藩風俗記云金姓相承三十餘代其先附庸於百濟因百濟征高麗人高麗人不堪戎役相率歸之遂致強盛其官有十七等一曰伊罰千二曰伊尺千三曰迎千四曰破彌千五曰大阿尺千六曰阿尺千七曰乙吉千八曰沙咄千九曰級伏千十曰大奈麻摩千十一曰奈摩千十二曰大舍十三曰小舍十四曰吉土十五曰大烏十六曰小烏十七曰造位國鎮馬韓地苞狗素東夷記曰百濟始建居狄城本馬韓之地范曄後漢書東夷傳曰韓有三種凡七十八國百濟是其一國焉魏志曰馬韓有牟水國狗素國也陵楚山而廓宇帶桑水而疏疆魏志曰馬韓在西散在山海間無城郭有爰襄國牟水國桑外國小石索國大石索國優休牟涿國臣濆活國伯濟國速盧不斯國日華國古誕者國古離國怒藍國月支國咨離牟盧國素謂乾國古爰國莫盧國卑離國占離卑國臣釁國支侵國狗盧國卑彌國監奚卑離國古蒲國致利鞠國冉路國兒林國駟盧國內卑離國感奚國萬盧國辟卑離國臼斯烏旦國一離國不彌國支半國狗素國捷盧國牟盧卑離國臣蘇塗國莫盧國古臘國臨素半國臣雲新國如來卑離國楚山塗卑離國一難國狗奚國不雲國不斯濆邪國爰池乾馬國楚離國凡五十餘國大國萬餘家小國數千家又西海中大島上有州胡國也奉仇台之祠纂夫餘之曹後魏書曰百濟國其先出自夫餘又百濟王上表於魏曰臣與高句驪源出夫餘宋書曰晉義熙十二年以百濟王餘映為使持節都督百濟諸郡事鎮東將軍高祖踐祚進號鎮東大將軍元嘉七年以餘映爵號授百濟王餘毗毗死子慶代立括地志曰百濟城立其祖仇台廟四時祠之也八族殊胤五部分司括地志曰隋開皇中其王名餘昌昌死子餘宣立死子餘璋立其國有沙氏燕氏劦氏解氏真氏國氏木氏苗氏八族其大姓也其官有十六等左平五人第一等達率三十人第二等恩率以下無員第三德率第四桿率第五奈率第六六等以上冠飾銀花將德第七紫帶施德第八皂帶固德第九赤帶季德第十青帶對德第十一以下皆黃帶文督第十二武督第十三以下皆白帶佐軍第十四振武第十五剋虞第十六又其內官有前內部穀內部內掠部外掠部馬部刀部功德部藥部木部法部後宮部又有將長外官有司軍部司徒部司空部司寇部點口部客部外舍部綢部日宮部市部凡此眾官各有宰官長吏在任皆三年一代王所都城內又為五部皆建率領之又城中五巷士庶居焉又有五方若中夏之都督皆建率領之每方管郡多者至十小者六七郡將皆恩率為之郡縣置道使亦名城主西據安城南鄰巨海括地志曰百濟王城方一里半北面累石為之城外可萬餘家即五部之所也一部有兵五百人又國南二百六十里有古沙城城方百五十步此其中方也方繞兵千二百人國東南百里有得安城城方一里此其東方也國南三百六十里有卞城城方一百三十步此其南方也國西三百五十里有力光城城方二百步此其西方也國東北六十里有熊津城一名固麻城城方一里半此其北方也其諸方之城皆憑山險為之亦有累石者其兵多者千人少者七八百人城中人多者千人少者七八百人城中戶多者至五百家諸城左右亦各有小城皆統諸方又國南海中有大島十五所皆置城邑有居之雞山東峙貫四序以同華括地志曰烏山在國北界大山也草木鳥獸與中夏同又國東有鷄藍山乙南又有祖粗山又國南界有霧五山其山草木冬夏常榮又有且𨚗山在國西界又有山且山禮母山並皆在國南之也熊水西流侶百川而濟騖括地志曰熊津河源出國東界西南流經國北百里又西流入海廣處三百步其水至清又有基汶河源出其國南山東南流入大海其中水族與中夏同因四仲而昭敬隨六甲以標年括地志曰百濟四仲之月祭天及五帝之神冬夏用鼓角奏歌舞春秋奏歌而已解陰陽五行用宋元嘉曆其紀年無別號但數六甲為次第亦解醫療蓍龜占相婚姻之制略同於華喪制父母及夫皆制服三年餘親葬訖即除其葬亦有置屍於山中者亦有埋殯之者文吏兼能碁射雙美括地志曰百濟俗尚騎射有文字能吏事以兩手據地為敬有僧尼無道士甚多寺塔其戲有投壺圍碁樗蒲握槊弄珠等雜戲也彎弧縱毒帶巨壑以偷安禦冷塗膏穴幽巖而自逸後漢書曰挹婁古肅慎之國也在夫餘東千餘里東濱大海種眾雖少而多勇力處山險又善射發能入人目弓長四尺力如弩矢用楛長一尺八寸青石為鏃鏃皆施毒中人即死便乘船好寇盜鄰國畏患而卒不能服東夷夫餘飲食類皆用俎豆唯挹婁獨無法俗最無綱紀人形似夫餘而言語各異有五穀麻布出赤玉好貂無君長其邑落各有大人處於山林之間土氣極寒無城郭依山林穴居好養豕食其肉衣其皮冬月以膏塗身以捍風寒夏則裸袒以尺布蔽其前後穴以深為貴大家至接九梯之也北窮弱水南界沃沮魏略曰肅慎氏其地在夫餘國北十日行東濱大海西接冠漫行國北極弱水其土界廣袤數千里居深山窮谷夏則巢居冬則穴處父子代為君長無文理以言語為約束續貂毛以為布以足挾肉噉之得凍肉坐其上令臑地土無鹽鐵燒木作灰灌之取汁而食插羽申交婚姻之旨爰適肅慎國記曰肅慎俗嫁娶之法男以毛羽插女頭女和則持歸然後置禮聘婦貞而女淫貴壯而賤老寡居終身不嫁性兇悍以無憂哀相向也灌繩知止送終之禮攸陳肅慎記曰肅慎俗父母死男子不哭泣有泣者謂之不壯死即日便葬於野以繩繫於槨頭出土以酒灌繩腐即止無四時祭祀之也周業斯隆姬誦銘其入賀肅慎記曰昔武主克商通道九夷百蠻各以其賄來貢使無忘職業於是肅慎貢楛矢石砮其長尺有咫先王欲昭其合德之致遠也以示後人使永監焉故銘其楛曰肅慎氏之貢矢王又以賜陳胡公成王時復入賀王使榮伯作賄肅慎之命也誦成王名也漢風尚阻劉徹嗟其未通肅慎記曰漢武帝時蕭慎不至策詔慷慨不能致之也徹武帝名馬首知歸明大邦之可謁陸劌鄴中記曰肅慎在鄴之東北去鄴五萬里遣使四年乃達獻石楛砮矢問使者緣何來此答云牛馬西南向眠三年則知有大國所在故來耳恆以此為候也雒常入用驗聖道之逾隆山海經曰在不咸山有肅慎國肅慎國在白民北有樹名曰雒常先人代帝於此取衣郭璞曰其俗無衣服中國有聖帝代立則此木生皮可衣也憑山負海鎮馬臺以建都後漢書曰倭在韓東南大海中依山島為居凡百餘國自武帝滅朝鮮使譯通於漢者三十許國國皆稱王其大倭王居邪馬臺國樂浪郡徼去其國萬二千里其地大較在會稽東冶之東與珠崖儋耳相近魏志曰倭人在帶方東南大海之中依山島為國邑炙問倭地絕在海中洲島之山或絕或連周旋可五千餘里四面俱抵海自營州東南經新羅至其國也按炙問以下魏志未載分職命官統女王而列部魏略曰從帶方至倭循海岸水行歷韓國到狗耶韓國七千餘里始度一海千餘里至對馬國其大官曰卑狗副曰卑奴無良田乘船南北市糴南度海至一支國置官及副同地方三百里又度海千餘里至末盧國人善捕魚能浮沒水取之東南五百里到伊都國戶萬餘置官曰爾支副曰洩謨觚柄渠觚其國王皆屬女王國也卑彌妖惑翻葉群情臺與幼齒方諧眾望後漢書曰安帝永初元年有倭面上國王師升等獻生口百六十人願請見至桓靈間倭國大亂更相攻伐歷年無主有一女子名曰卑彌呼事鬼神道能以妖惑眾於是共立為王宗女臺與年十三為王國中遂定其國官首曰支馬次曰彌馬僕升次曰彌馬次曰奴佳鞮之也按宗女以下漢書未載文身點面猾稱太伯之苗魏略曰女王之南又有狗奴國男子為王其官曰狗古智卑狗不屬女王也自帶方至女王國萬二千餘里其俗男子皆黥面文身聞其舊語自謂太伯之後昔夏后少康之子封於會稽斷髮文身以避蛟龍之害今倭人亦文身以厭水害也阿輩雞彌自表天兒之禰梁沈約宋書曰永初中倭國有王曰讚至元嘉中讚死弟珍立自稱使持節都督安東大將軍倭國王順帝時遣使上表云自昔祖禰東征毛人五十五國西服眾夷六十六國渡平海北九十五國今案其王姓阿每其國號為阿輩雞彌華言天兒也父子相傳王有宮女六七百人王長子號和哥彌多弗利華言太子因禮義而標秩即智信以命官括地志曰倭國其官有十二等一日麻卑兜吉寐華言大德二曰小德三曰大仁四曰小仁五曰大義六曰小義七曰大禮八曰小禮九曰大智十曰小智十一曰大信十二曰小信邪屆伊都傍連斯馬廣志曰倭國東南陸行五百里到伊都國又南至邪馬嘉國百女國以北其戶數道里可得略載次斯馬國次巴百國次伊邪國倭國西南海行一日有伊邪分國無布帛以革為衣蓋伊耶國也中元之際膺紫綬之榮漢書地志曰夫樂浪海中有倭人分為百餘國以歲時來獻見云後漢書建武中元二年倭國奉貢朝賀使人自稱大夫光武賜以印綬安帝永初元年倭王帥升等獻生口百六十人景初之辰恭文錦之獻魏志曰景初二年倭女王遣大夫難升米牛利等獻男生口四人女生口六人班布二疋二丈詔以為親魏倭王假金印紫綬正始四年倭王復遣大夫伊聲耆掖邪狗等八人上獻生口也犬戎縱暴克展槃瓠之功帝女降嬪仍搆蠻方之緒范曄後漢書曰昔高辛氏有犬戎之寇帝患其侵暴而征伐之不剋乃訪募天下有能得犬戎將吳將軍頭者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂銜人頭造闕下群臣怪而診之乃吳將軍首也帝大喜計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請行帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絕人跡不至於是女解去衣裳為僕鑒之髮著獨力之衣帝悲思遣使尋求輒遇風雨震晦使者不得進經年生子十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其母後歸以狀白帝於是使迎致諸子衣裳斑蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷獺冠表飾精夫之號斯傳後漢書曰蠻外癡內黠安土重舊以先父有功母帝之女田作賈販無關渠符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒今長沙武陵蠻是也賨布申誠武陵之部爰置後漢書曰吳悼王南并蠻越遂有洞庭蒼梧秦昭王使白起伐楚略取蠻夷始置黔中郡漢興改為武陵歲令大人輸布一疋小口二丈是為賓布雖時寇盜而不足為患也武威鞠榱阻危徑以亡軀後漢書曰光武中興武陵蠻夷特盛建武廿三年精夫相單程等據其險阻大寇郡縣遣武威將軍劉尚發南郡長沙武陵兵萬餘人乘船泝沅水入武谿擊之尚輕敵入險山深水疾舟船不得上蠻知尚糧少入遠又不曉道徑遂屯聚守險尚食盡引還蠻緣路徼戰尚軍大敗伏波臨式因炎雲而致命後漢書曰建武二十四年相單程等下攻臨沅明年遣伏波將軍馬援中郎將劉匡馬武等將兵至臨沅擊破之單程等飢困乞降會援病卒謁者宗均聽悉受降為置吏司群蠻遂平詹山振拒尚銜應奉之恩後漢書曰桓帝時武陵蠻詹山等四千餘人反叛拘執縣令屯結深山至永興元年太守應奉以恩信招誘皆悉降散象林趑趄猾感祝良之惠後漢書順帝時日南象林徼外蠻夷區憐等數千人燒城寺殺長吏用李固議拜祝良九真太守張喬為交阯剌史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人皆為良築起府寺由是嶺外復平也雕題列徼傍帶甘人之鄉後漢書曰禮記稱南方曰蠻雕題交阯其俗男女同川而浴故曰交阯其西有噉人之國生首子輒解而食之謂之宜弟味旨則以遺其君君喜而賞其父取妻美則讓其兄今烏滸人是也楚詞招魂曰彼皆甘人魂往必適也交阯開邊前贍獻雉之國後漢書曰交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠遠山川阻深音使不通故重譯而朝成王以歸周公公曰德不加焉則君子不饗其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇曰久矣天之無烈風雷雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟也玄犀廌祉通譯元始之年後漢書曰王莽輔政元始二年日南之南黃支國來獻犀牛凡交阯所統雖置郡縣而言語各異重譯乃通人如禽獸長幼無別項髻徒跣以布貫頭而著之後頗徙中國罪人使雜居其間乃稍知言語漸見禮化也白菟初祥懷仁建武之歲後漢書曰光武中興錫光為交阯任延守九真於是教其耕稼制為冠履初設媒娉始知姻娶建立學校導之禮義建武十二年九真徼外蠻里張游率種人慕化內屬封歸漢里君明年南越徼外蠻夷獻白雉白莬也徵側叛渙合浦申馬援之功後漢書曰建武十六年交阯女子徵側及其妹徵貳反攻郡徵側者麊泠縣雒將之女也嫁為朱鳶人詩索妻甚雄勇交阯太守蘇定以法繩之側忿故反於是九真日南合浦蠻里皆應之凡略六十五城自立為王交阯刺史及諸太守僅得自守十八年乃遣伏波將軍馬援樓船將軍段志發長沙桂陽零陵蒼梧兵萬餘人討之明年夏四月援破交阯斬徵側徵貳等餘皆降散進擊九真賊都陽等破降之徙其渠帥三百餘口於零陵也朱達憑凌日南著侯方之績後漢書曰桓帝永壽三年居風令貪暴無度縣人朱達等及蠻夷相聚攻殺縣令進攻九真屯據日南眾轉強盛延熹三年詔拜夏侯方為交阯刺史威惠素著日南宿賊聞之二萬餘人相率詣方降方開始詔誘之也土舟既驚用興巴氏之宗後漢書曰巴郡南郡蠻本有五姓巴氏樊氏曋氏相氏鄭氏皆出於武落鍾離山其山有赤黑二穴巴氏之子生於赤穴四姓之子皆生於黑穴未有君長俱事鬼神乃共擲劍於石穴約能中者奉以為君巴氏之子務相乃獨中之眾皆歎又令各乘土船約能浮者當以為君餘姓悉沉唯務相獨浮因共立之是為廩君也鹽神且亡寔啟夷城之祚後漢書曰廩君乃乘土船從夷水至鹽陽鹽水有神女謂廩君曰此地廣大魚鹽所出願留共居廩君不許鹽神暮輒來宿旦即化為蟲與諸蟲群飛掩蔽日光天地晦冥積十餘日廩君伺其便因射殺之天乃開明廩君於是君乎夷城四姓皆臣之廩君死魂魄世為白虎巴氏以白虎飲人血遂以人祠焉及秦惠王並巴中以巴氏為蠻夷君長世尚秦女其爵比不更有罪得以爵除登樓騁伎方呈白獸之功刻石銘勳爰表黃龍之誓後漢書曰板楯蠻夷者秦昭襄主時有一白虎常從群虎數遊秦蜀巴漢之境傷害千餘人昭主乃重募國中有能殺虎者賞邑萬家金百鎰時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之而以其夷人不欲加封乃刻石盟要復夷人項田不租十妻不算傷人者論殺人者得以倓錢贖死盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之至高祖為漢王發夷人還伐三秦秦地既定乃遣還巴中復其帥渠羅樸督鄂度夕龔七姓不輸租賦餘戶乃歲人賨錢口四十世號為板楯蠻夷之也夜郎啟搆爰契浮竹之靈後漢書曰西南夷者在蜀郡徼外有夜郎國東接交阯西有滇國北有邛都國各立君長其人皆椎結左袵邑聚而居能耕田其外又有巂昆明諸落西極同師東北至葉榆地方數千里無君長辮髮隨畜遷徙無常自巂東北有莋都國莋都國東北有冉駹國或土著或隨畜遷徙自冉駹東北有白馬國氏種是也此三國亦有君長夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓武帝元鼎六年平南夷為牂柯郡夜郎侯迎降天子賜其王印綬後遂殺之哀牢創基實符沉木之胤後漢書曰哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚水中觸沉木若有感因懷妊十月產子男十人後沉木化為龍出水上沙壹忽聞龍語曰若為我生十子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因舐之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所而黠遂共推以為王三侯並建既配饗於牂柯後漢書曰夜郎侯以竹為姓武帝平南夷為牂柯郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠或以竹王非血氣所生甚重之求為立後牂柯太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭以且蘭有椓船牂柯處乃改其名為牂柯十子分曹竟馳誠於越巂後漢書曰牢山下有一夫一婦復生十女子哀牢夷九隆兄弟十人皆取以為妻後漸相滋長種人皆刻畫其身象龍文衣皆著尾九隆死世世相繼乃分置小王往往邑居散在谿谷絕域荒外山川阻深生人以來未嘗交通中國建武二十三年其王賢栗遣兵擊附塞夷鹿茤鹿茤人弱為所禽獲於是震雷疾雨南風飄起水為逆流翻涌二百餘里哀牢之眾溺死者數千人賢栗復遣其六王將萬餘人攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之餘眾驚怖引云賢栗乃惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輒被天誅中國其有聖帝乎天祐助之何其明也賢栗遂率種人詣越巂太守鄭鴻降求內屬光武封賢栗等為君長莊豪之將楚卒遂王滇池後漢書曰滇王者莊豪之後也初楚頃襄王時遣將莊豪從沅水伐夜郎滅之因留王滇池元封二年武帝平之以其地為益州郡割牂柯越巂各數縣配之後數年復并昆明地皆以屬之此郡有池周迴二百餘迴里水源深廣而末更淺狹有似倒流故謂之滇池河土平敞多出鸚鵡孔雀有鹽池田漁之饒金銀畜產之富也長貴之戮枚根乃居卬澤後漢書曰卭都夷者武帝所開以為卭都縣無幾而地陷為汙澤因名為卭池南人以為卭河後復反叛元鼎六年漢兵自越嶲水伐之以為越巂郡其土地平原有稻田青蛉縣禺同山有碧鷄金馬光景時時出見俗多遊蕩而喜謳歌略與牂柯相類豪帥放縱難得制御王莽時郡守枚根調卭人長貴以為軍候更始二年長貴率種人攻殺枚根自為卭穀主領太守事又降於公孫述述敗光武封長貴為卭榖主後又授越巂太守印綬仇池汶郡飡和於元鼎之年後漢書曰白馬氏者武帝元鼎六年開分廣漢西部合以為武都土地險阻有麻田出名馬牛羊漆蜜氐人勇戇抵冒貪貨死利居於河池一名仇池方百頃四面斗絕數為邊寇冉駹夷者武帝所開元鼎六年以為汶山郡至地節三年夷人以立郡賦重宣帝乃省并蜀郡為北部都尉其山有六夷七羌九氐各有部落其主侯頗知文書而法嚴重貴婦人黨母族死則燒其尸土氣多寒盛夏冰猶不釋槃木白狼慕化於永平之際後漢書曰莋都夷者武帝所開以為莋都縣其人皆被髮左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沉黎郡至天漢四年并蜀為西部置兩都尉一居旄牛主徼外夷一居青衣主漢人永平中益州刺史梁國朱輔好立功名在州數歲宣示漢德威懷遠夷自汶山以西前世所不至正朔所未加白狼槃木唐菆等百有餘國戶百三十餘萬口六百萬以上舉種奉貢也懷仁動詠覃帝澤於夷都後漢書曰益州刺史朱輔上疏稱莋都夷慕化歸義作詩三章一曰大漢是治與天意合吏譯平端不從我來聞風向化所見奇異多賜繒布甘美酒食昌樂肉飛屈伸悉備蠻夷貧薄無所報嗣願主長壽子孫昌熾二曰蠻夷所處日入之部慕義向化歸日出主聖德深恩與人富厚冬多霜雪夏多和雨寒溫時適部人多有涉危歷險不遠萬里去俗歸德心歸慈母三曰荒服之外土地磽埆食肉衣皮不見鹽穀吏譯傳風大漢安樂攜負歸仁觸冒險陝高山岐峻緣崖磻石木薄發家百宿到洛父子同賜懷抱匹帛傳告種人長願臣僕沐德興謠漸皇猷於倉水後漢書曰明帝永平十二年置哀牢博南二縣割益州郡西部都尉所領六縣合為永昌郡始通博南山度蘭倉水行者苦之歌曰漢德廣開不賓度博南越蘭津度蘭倉為他人哀牢人皆穿鼻儋耳其渠帥自謂主者耳皆下肩三寸庶人則至肩而已土地沃美宜五穀蠶桑也楊竦高績託像於丹青後漢書曰永昌益州及蜀郡夷皆叛詔益州刺史張喬選堪能從事討之喬乃遣從事楊竦將兵至楪榆擊之賊盛未敢進先以詔書告示三郡密徵求武士重其購賞乃進軍與封離等戰大破之斬首三萬餘級獲生口千五百人資四千餘萬以賞軍士封離等惶怖其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆求降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死州中論功未及上會竦病瘡卒益州刺史張喬深痛惜之刻石勒銘圖畫像焉張翕深仁表靈於祠宇後漢書曰張翕為巴郡太守政化清平得夷人和在郡十七年卒夷人愛慕如喪父母蘇祈叟二百餘人齊牛羊送喪至翕本縣安漢起墳祭祀詔書嘉美為立祠堂云南浦開基趙佗構其遙緒漢書曰南越王趙佗真定人秦并天下略定揚置桂林南海象郡秦末南海尉任囂病且死召龍川令趙佗語曰聞陳勝等作亂豪傑叛秦相立南海辟遠恐盜兵侵此吾欲興兵絕新道自備待諸侯變會病且甚故召公告之即被佗書行南海尉事囂死佗即移檄告橫浦陽山湟谿關曰盜兵且至急絕道聚兵自守秦己滅佗即擊并桂林象郡自立為南越武王高帝已定天下遣陸賈立佗為南越王與剖符通使使和輯百越毌為邊害也東甌闢壤句踐疏其濬源漢書曰閩越王無諸及越東海王搖其先皆越王句踐之後也姓騶氏秦并天下廢為君長以其地為閩中郡及諸侯叛秦無諸及搖率越歸番陽令吳芮從諸侯滅秦擊項籍無諸搖帥越人佐漢漢復立無諸為閩越王閩中故地搖為東海王都東甌也陸子馳軒僭擬之名斯替漢書曰高后時有司請禁南越關市鐵器趙佗乃自尊號為南武帝發兵攻長沙東西萬餘里乃乘黃屋左纛稱制與中國侔文帝初乃為佗親冢在真定置守邑歲時奉祀召其從昆弟尊官厚賜寵之乃召陸賈為太中大夫賜佗書佗乃頓首謝願奉明詔長為藩臣奉貢職按此節以下疑有闕文眩人入獻表安息遐通漢書曰安息國王番兜城去長安一萬一千六百里北與康居東與烏弋山離西與條支接武帝始遣使至安息王令將將二萬騎迎於東界東界去王都數千里行比至過數十城人民相屬因發使隨漢使者來觀漢地以大鳥卵及犂靬眩人獻于天子天子大說也𡛜降烏孫泣對旃裘之俗漢書曰烏孫國大昆彌治赤谷城去長安八千九百里東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地也武帝令張騫齎金幣往賜元封中以江都王建女細君為公主以妻焉賜乘輿服御物昆莫年老語言不通公主悲愁自為作歌曰吾家嫁我兮天一方遠託異國兮烏孫王穹廬為室兮旃為牆以肉為食兮酪為漿居常土思兮心內傷願為黃鵠兮歸故鄉夢傳天竺欣覩金色之容後漢書天竺國一名身毒在月氏東南數千里俗與月氏同修浮圖道不殺伐遂以成俗從月氏高附國以西南至西海東至磐起國皆身毒之地身毒有別城數百城置長別國數百國數十國置王雖各小異而俱以身毒為名土出犀象瑇瑁金銀銅鐵錫鉛西與大秦通明帝夢見金人長大頂有光明以問群臣或曰西方有神名曰佛其形長丈六尺而黃金色帝於是遣使天竺問佛道法遂於中國圖畫形像焉楚王英始信其術中國因此頗有奉其道者綏撫有方龜茲以之入賀漢書曰龜茲國王治延城去長安七千四百八十里元康元年龜茲國來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼓歌吹數十人綺繡雜繒琦珍凡數千萬留且一年厚贈送之後數來朝賀樂漢衣服制度歸其國治宮室作徼道周衛出入傳呼撞鍾鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜茲王所謂驘也王死其子丞德自謂漢外孫成哀帝時往來尤數漢遇之亦甚親密也招攜以禮疏勒於是來王後漢書曰疏勒去洛陽萬三百里順帝時王臣磐遣使奉獻帝拜臣磐為漢大都尉兄子臣勳為守國司馬五年臣磐遣侍子與大宛莎車使俱詣闕貢獻陽嘉二年臣磐復獻師子封牛等亡亡
